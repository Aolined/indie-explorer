name: Update catalog

on:
  schedule:
    - cron: "15 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-catalog
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh catalog
        run: python3 scripts/update_catalog.py

      - name: Run parser tests
        run: python3 -m unittest discover -s tests -v

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/projects.json data/sources.json; then
            echo "Catalog is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/projects.json data/sources.json
          git commit -m "chore(data): refresh project catalog"
          git push
